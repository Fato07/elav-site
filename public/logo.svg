<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 100" fill="#0a0a0a">
  <!-- ELAV AI — monolinear geometric sans, A=no crossbar, consistent 10px stroke -->
  
  <!-- E -->
  <rect x="0" y="0" width="10" height="100"/>
  <rect x="0" y="0" width="52" height="10"/>
  <rect x="0" y="45" width="42" height="10"/>
  <rect x="0" y="90" width="52" height="10"/>
  
  <!-- L -->
  <rect x="76" y="0" width="10" height="100"/>
  <rect x="76" y="90" width="52" height="10"/>
  
  <!-- A (no crossbar) — two diagonals meeting at sharp peak -->
  <polygon points="174,100 164,100 195,0 205,0 236,100 226,100 200,16"/>
  
  <!-- V — mirror of A -->
  <polygon points="252,0 262,0 288,84 314,0 324,0 294,100 282,100"/>
  
  <!-- gap 56px -->
  
  <!-- A (no crossbar) — identical to first -->
  <polygon points="416,100 406,100 437,0 447,0 478,100 468,100 442,16"/>
  
  <!-- I -->
  <rect x="502" y="0" width="10" height="100"/>
</svg>